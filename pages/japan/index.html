      <div style={S.filterBar}>
        {filters.map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:"0.28rem 0.8rem",borderRadius:"2rem",border:`1px solid ${filter===f?"#c8a882":"#ccc5b5"}`,background:filter===f?"#c8a882":"transparent",color:filter===f?"#fff":"#8a7050",cursor:"pointer",fontSize:"0.66rem",letterSpacing:"0.06em",fontFamily:"inherit",whiteSpace:"nowrap",transition:"all 0.15s"}}>{f}</button>
        ))}
      </div>

      {/* DAY TABS */}
      <div style={S.tabs} ref={tabsRef}>
        {filtered.map(d=>(
          <button key={d.day} data-active={activeDay===d.day} onClick={()=>setActiveDay(d.day)} style={{flex:"0 0 auto",padding:"0.65rem 0.55rem 0.4rem",border:"none",cursor:"pointer",fontFamily:"inherit",minWidth:52,textAlign:"center",borderBottom:activeDay===d.day?`3px solid ${d.color}`:"3px solid transparent",background:activeDay===d.day?"#f7f3ed":"transparent",transition:"background 0.15s"}}>
            <div style={{fontSize:"1rem"}}>{d.emoji}</div>
            <div style={{fontSize:"0.58rem",color:activeDay===d.day?d.color:"#9a8070",marginTop:"0.1rem",fontWeight:activeDay===d.day?"bold":"normal"}}>{d.day}</div>
            <div style={{fontSize:"0.48rem",color:"#b0a080"}}>{d.date.split(" ")[1]} {d.date.split(" ")[2]}</div>
          </button>
        ))}
      </div>

      {/* DAY DETAIL */}
      {current&&(
        <div style={S.dayContent}>
          {/* Header */}
          <div style={S.dayHeader}>
            <div style={{display:"flex",gap:"0.75rem",alignItems:"flex-start"}}>
              <div style={{fontSize:"2.5rem",lineHeight:1,flexShrink:0}}>{current.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:"0.58rem",color:"#9a8060",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:"0.25rem"}}>Day {current.day} · {current.date} · {current.location}</div>
                <div style={{fontSize:"1.2rem",color:"#1e1812",lineHeight:1.45,fontStyle:"italic"}}>{current.summary}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:"0.3rem",flexWrap:"wrap",marginTop:"0.85rem"}}>
              {current.tags.map(t=>(
                <span key={t} style={{fontSize:"0.58rem",padding:"0.14rem 0.52rem",borderRadius:"1rem",background:`${tagColors[t]||"#888"}18`,color:tagColors[t]||"#888",border:`1px solid ${tagColors[t]||"#888"}28`,letterSpacing:"0.04em"}}>{t}</span>
              ))}
            </div>
          </div>

          {/* Morning walk */}
          {current.morningWalk&&(
            <div style={{...S.section,background:`${familyColors.Chris}0e`,border:`1px solid ${familyColors.Chris}28`,borderRadius:"0.85rem",padding:"1rem 1.1rem"}}>
              <div style={{display:"flex",gap:"0.6rem",alignItems:"center",marginBottom:"0.55rem"}}>
                <span style={{fontSize:"1rem"}}>☕</span>
                <div style={{fontSize:"0.58rem",color:familyColors.Chris,letterSpacing:"0.18em",textTransform:"uppercase"}}>Chris's Morning · {current.morningWalk.who}</div>
              </div>
              <div style={{fontSize:"0.87rem",color:"#5a4830",lineHeight:1.6,fontStyle:"italic",marginBottom:"0.45rem"}}>{current.morningWalk.route}</div>
              <div style={{display:"flex",gap:"1.5rem",flexWrap:"wrap"}}>
                <span style={{fontSize:"0.7rem",color:"#9a8060"}}>⏱ {current.morningWalk.duration}</span>
                <span style={{fontSize:"0.7rem",color:"#9a8060"}}>☕ {current.morningWalk.coffee}</span>
              </div>
            </div>
          )}

          {/* Pairings */}
          {current.pairings.length>0&&(
            <div style={S.section}>
              <div style={S.sectionLabel}>Family Pairings Today</div>
              <div style={{display:"flex",flexDirection:"column",gap:"0.45rem"}}>
                {current.pairings.map((p,i)=>(
                  <div key={i} style={{background:"#fff",border:"1px solid #e8e0d0",borderRadius:"0.7rem",padding:"0.75rem 0.9rem",display:"flex",gap:"0.85rem",alignItems:"flex-start"}}>
                    <div style={{fontSize:"0.68rem",fontWeight:"bold",color:"#c8a882",minWidth:110,paddingTop:"0.12rem",flexShrink:0}}>{p.pair}</div>
                    <div style={{fontSize:"0.82rem",color:"#5a4830",lineHeight:1.5}}>{p.activity}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Schedule */}
          <div style={S.section}>
            <div style={S.sectionLabel}>Schedule</div>
            <div style={S.card}>
              {current.schedule.map((item,i)=>{
                const k=`${activeDay}-${i}`;
                const isOpen=openItems[k];
                const dot=typeColors[item.type]||"#999";
                const wc=item.who&&familyColors[item.who]?familyColors[item.who]:null;
                return(
                  <div key={i} onClick={()=>toggle(k)} style={{borderBottom:i<current.schedule.length-1?"1px solid #f0ebe2":"none",background:isOpen?"#fdfaf6":"#fff",cursor:"pointer",transition:"background 0.12s"}}>
                    <div style={{display:"flex",gap:"0.7rem",padding:"0.65rem 0.9rem",alignItems:"flex-start"}}>
                      <div style={{width:6,height:6,borderRadius:"50%",background:dot,marginTop:"0.45rem",flexShrink:0}}/>
                      <div style={{fontSize:"0.65rem",color:"#a09070",minWidth:56,paddingTop:"0.14rem",flexShrink:0}}>{item.time}</div>
                      <div style={{fontSize:"0.9rem",flexShrink:0}}>{item.icon}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap"}}>
                          <span style={{fontSize:"0.85rem",color:"#1e1812",lineHeight:1.35}}>{item.label}</span>
                          {wc&&item.who!=="Family"&&(
                            <span style={{fontSize:"0.56rem",padding:"0.08rem 0.4rem",borderRadius:"1rem",background:`${wc}14`,color:wc,border:`1px solid ${wc}25`,whiteSpace:"nowrap"}}>{item.who}</span>
                          )}
                        </div>
                        {isOpen&&item.detail&&(
                          <div style={{fontSize:"0.76rem",color:"#7a6040",lineHeight:1.55,marginTop:"0.3rem",fontStyle:"italic"}}>{item.detail}</div>
                        )}
                      </div>
                      <div style={{color:"#c8a882",fontSize:"0.55rem",flexShrink:0,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Notes */}
          {current.notes&&(
            <div style={S.noteBox}>
              <div style={{fontSize:"0.58rem",letterSpacing:"0.22em",color:"#c8a882",textTransform:"uppercase",marginBottom:"0.4rem"}}>Planning Notes</div>
              <div style={{fontSize:"0.82rem",color:"#7a5830",lineHeight:1.65}}>{current.notes}</div>
            </div>
          )}
        </div>
      )}

      {/* FOOTER / BOOKING CHECKLIST */}
      <div style={S.footer}>
        <div style={{maxWidth:820,margin:"0 auto"}}>
          <div style={{fontSize:"0.58rem",letterSpacing:"0.38em",color:"#c8a882",textTransform:"uppercase",marginBottom:"1.5rem",textAlign:"center"}}>Book Immediately</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"0.6rem"}}>
            {bookings.map((item,i)=>(
              <div key={i} style={{background:item.urgent?"rgba(200,80,50,0.09)":"rgba(240,232,218,0.03)",border:`1px solid ${item.urgent?"rgba(200,80,50,0.22)":"rgba(200,168,130,0.09)"}`,borderRadius:"0.6rem",padding:"0.75rem 0.9rem"}}>
                <div style={{fontSize:"0.78rem",color:"#f0e0c0",lineHeight:1.35,marginBottom:"0.22rem"}}>
                  {item.urgent&&<span style={{color:"#e87050",marginRight:"0.3rem"}}>★</span>}
                  {item.what}
                </div>
                <div style={{fontSize:"0.65rem",color:item.urgent?"#e87050":"#6a5030"}}>{item.when}</div>
              </div>
            ))}
          </div>

          {/* Ghibli warning */}
          <div style={{marginTop:"1.5rem",padding:"1.1rem",background:"rgba(200,168,130,0.06)",border:"1px solid rgba(200,168,130,0.15)",borderRadius:"0.75rem"}}>
            <div style={{fontSize:"0.6rem",color:"#c8a882",letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:"0.5rem"}}>⚠️ Ghibli Ticket Reminder</div>
            <div style={{fontSize:"0.82rem",color:"#b0a080",lineHeight:1.65}}>
              Tickets for July visits go on sale <strong style={{color:"#f0e0c0"}}>Monday June 9, 2026 at 9:00pm Indianapolis time (EDT)</strong> — that is 10:00am JST on June 10 in Japan. Create your Lawson Ticket account now. Log in 15–30 minutes early. Do not refresh repeatedly before the sale opens.
            </div>
          </div>

          <div style={{marginTop:"2rem",textAlign:"center",fontSize:"0.58rem",color:"#3a2e20",letterSpacing:"0.15em"}}>JAPAN 2026 · CHRIS · ANNA · ZOE · EMILY</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
