<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MakerWorld Font Preview</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #24242c;
    --border: #2e2e3a;
    --accent: #e8c547;
    --accent2: #5b8def;
    --text: #f0eff5;
    --text-muted: #7a7a92;
    --text-dim: #4a4a62;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 14px;
  }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #0f0f11; font-size: 16px; flex-shrink: 0; letter-spacing: -2px; }
  header h1 { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); font-weight: 400; }
  header h1 b { color: var(--accent); }
  .count-badge { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: var(--text-muted); }
  .count-badge b { color: var(--accent); }

  .controls {
    padding: 14px 32px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 61px; z-index: 99;
  }
  input[type=text], input[type=search] {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; color: var(--text); font-size: 13px;
    font-family: inherit; outline: none; transition: border-color .2s;
  }
  input[type=text]:focus, input[type=search]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text-dim); }
  #preview-input { flex: 1; min-width: 180px; max-width: 380px; }
  #search-input { width: 170px; }

  .size-wrap { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 11px; color: var(--text-muted); }
  .size-wrap input[type=range] { width: 80px; accent-color: var(--accent); cursor: pointer; }
  .size-val { color: var(--accent); min-width: 34px; text-align: right; font-size: 11px; }

  .filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .f-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 6px 13px; font-size: 11px; font-family: inherit; color: var(--text-muted); cursor: pointer; letter-spacing: .04em; transition: all .18s; }
  .f-btn:hover { border-color: var(--accent); color: var(--accent); }
  .f-btn.on { background: var(--accent); border-color: var(--accent); color: #0f0f11; font-weight: 700; }

  .sub-bar { padding: 10px 32px 6px; font-size: 10px; letter-spacing: .1em; color: var(--text-dim); text-transform: uppercase; }

  .grid { padding: 4px 20px 48px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px 14px; display: flex; flex-direction: column; gap: 8px; transition: all .16s; animation: fu .28s ease both; }
  .card:hover { border-color: rgba(232,197,71,.35); background: var(--surface2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,.4); z-index: 2; position: relative; }

  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .fname { font-size: 10px; letter-spacing: .07em; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tags { display: flex; gap: 4px; flex-shrink: 0; }
  .tag { font-size: 8px; padding: 2px 6px; border-radius: 8px; letter-spacing: .06em; text-transform: uppercase; }
  .tag-sans { background: rgba(232,197,71,.12); color: var(--accent); border: 1px solid rgba(232,197,71,.3); }
  .tag-serif { background: rgba(91,141,239,.13); color: var(--accent2); border: 1px solid rgba(91,141,239,.3); }
  .tag-display { background: rgba(200,90,200,.12); color: #d97be0; border: 1px solid rgba(200,90,200,.3); }
  .tag-mono { background: rgba(90,220,180,.12); color: #5adcb4; border: 1px solid rgba(90,220,180,.3); }
  .tag-hand { background: rgba(220,130,80,.12); color: #e07a4a; border: 1px solid rgba(220,130,80,.3); }

  .preview { line-height: 1.2; color: var(--text); min-height: 42px; word-break: break-word; }
  .weights { display: flex; flex-wrap: wrap; gap: 3px; }
  .wchip { font-size: 8px; padding: 1px 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; color: var(--text-dim); }

  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 30vh; gap: 8px; color: var(--text-dim); font-size: 12px; }
  .empty .big { font-size: 36px; }

  @keyframes fu { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Ff</div>
  <h1>MAKERWORLD <b>FONT PREVIEW</b></h1>
  <div class="count-badge"><b id="vis">—</b> / <span id="tot">—</span> fonts</div>
</header>

<div class="controls">
  <input type="text" id="preview-input" placeholder="Type preview text…" value="The quick brown fox" />
  <div class="size-wrap">
    <span>Size</span>
    <input type="range" id="size-slider" min="14" max="72" value="32" />
    <span class="size-val" id="size-label">32px</span>
  </div>
  <div class="filters" id="cat-filters">
    <button class="f-btn on" data-cat="all">All</button>
    <button class="f-btn" data-cat="sans">Sans Serif</button>
    <button class="f-btn" data-cat="serif">Serif</button>
    <button class="f-btn" data-cat="display">Display</button>
    <button class="f-btn" data-cat="mono">Monospace</button>
    <button class="f-btn" data-cat="hand">Handwriting</button>
  </div>
  <div class="filters" id="weight-filters">
    <button class="f-btn on" data-wt="all">Any Weight</button>
    <button class="f-btn" data-wt="100">Thin</button>
    <button class="f-btn" data-wt="200">XLight</button>
    <button class="f-btn" data-wt="300">Light</button>
    <button class="f-btn" data-wt="400">Regular</button>
    <button class="f-btn" data-wt="500">Medium</button>
    <button class="f-btn" data-wt="600">SemiBold</button>
    <button class="f-btn" data-wt="700">Bold</button>
    <button class="f-btn" data-wt="800">XBold</button>
    <button class="f-btn" data-wt="900">Black</button>
  </div>
  <input type="search" id="search-input" placeholder="Search fonts…" />
</div>

<div class="sub-bar" id="sub-bar"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none"><div class="big">⌕</div><div>No fonts match</div></div>

let previewText = 'The quick brown fox';
let fontSize = 32;
let activeCat = 'all';
let activeWeight = 'all';
let search = '';
const loaded = new Set();

function cat(f) {
  const c = (f.c || '').toLowerCase();
  const cl = (f.cl || []).map(x => x.toLowerCase());
  if (c.includes('monospace') || cl.includes('monospace')) return 'mono';
  if (c.includes('handwriting') || cl.includes('handwriting')) return 'hand';
  if (cl.includes('display') || c.includes('display')) return 'display';
  if (c.includes('sans')) return 'sans';
  if (c.includes('serif')) return 'serif';
  return 'display';
}

function tagHtml(k) {
  const m = {sans:['tag-sans','Sans'],serif:['tag-serif','Serif'],display:['tag-display','Display'],mono:['tag-mono','Mono'],hand:['tag-hand','Script']};
  const [cls,lbl] = m[k] || ['tag-sans',k];
  return `<span class="tag ${cls}">${lbl}</span>`;
}

const WL = {100:'Thin',200:'XLight',300:'Light',400:'Regular',500:'Medium',600:'SemiBold',700:'Bold',800:'XBold',900:'Black',1000:'UltraBlack'};

const allFonts = RAW.map(f => ({...f, _cat: cat(f)}));
document.getElementById('tot').textContent = allFonts.length;

function loadFont(family, weights) {
  if (loaded.has(family)) return;
  loaded.add(family);
  const wgts = weights.filter(w => !String(w).endsWith('i')).join(';') || '400';
  const url = `https://fonts.googleapis.com/css2?family=${family.replace(/ /g,'+')}:wght@${wgts}&display=swap`;
  const l = document.createElement('link'); l.rel='stylesheet'; l.href=url;
  document.head.appendChild(l);
}

let renderTimer;
function render() {
  const filtered = allFonts.filter(f => {
    const catOk = activeCat === 'all' || f._cat === activeCat;
    const weightOk = activeWeight === 'all' || (f.w || []).map(String).includes(activeWeight);
    const searchOk = !search || f.f.toLowerCase().includes(search.toLowerCase());
    return catOk && weightOk && searchOk;
  });

  document.getElementById('vis').textContent = filtered.length;
  const catLabels = {all:'fonts',sans:'sans-serif fonts',serif:'serif fonts',display:'display fonts',mono:'monospace fonts',hand:'handwriting fonts'};
  document.getElementById('sub-bar').textContent = `${filtered.length} ${catLabels[activeCat] || activeCat}${search ? ` matching "${search}"` : ''}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (!filtered.length) { grid.style.display='none'; empty.style.display='flex'; return; }
  grid.style.display='grid'; empty.style.display='none';

  grid.innerHTML = '';
  filtered.forEach((f, i) => {
    const weights = (f.w || []).filter(w => !String(w).endsWith('i'));
    const dw = weights.includes('700')?700:weights.includes('400')?400:(+weights[0]||400);
    loadFont(f.f, f.w || []);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i*15,280)}ms`;

    const wchips = weights.map(w => `<span class="wchip">${WL[+w]||w}</span>`).join('');
    card.innerHTML = `
      <div class="card-top">
        <span class="fname" title="${f.f}">${f.f}</span>
        <div class="tags">${tagHtml(f._cat)}</div>
      </div>
      <div class="preview" style="font-family:'${f.f}',sans-serif;font-weight:${dw};font-size:${fontSize}px">${escHtml(previewText)}</div>
      <div class="weights">${wchips}</div>`;
    grid.appendChild(card);
  });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updatePreviews() {
  document.querySelectorAll('.preview').forEach(el => { el.textContent = previewText; });
}
function updateSizes() {
  document.querySelectorAll('.preview').forEach(el => { el.style.fontSize = fontSize+'px'; });
}

document.getElementById('preview-input').addEventListener('input', e => {
  previewText = e.target.value || 'Aa Bb Cc';
  updatePreviews();
});
document.getElementById('size-slider').addEventListener('input', e => {
  fontSize = +e.target.value;
  document.getElementById('size-label').textContent = fontSize+'px';
  updateSizes();
});
document.getElementById('cat-filters').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('#cat-filters .f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeCat = btn.dataset.cat;
  render();
});
document.getElementById('weight-filters').addEventListener('click', e => {
  const btn = e.target.closest('.f-btn');
  if (!btn) return;
  document.querySelectorAll('#weight-filters .f-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeWeight = btn.dataset.wt;
  render();
});
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(renderTimer);
  search = e.target.value;
  renderTimer = setTimeout(render, 200);
});

render();
</script>
</body>
</html>
